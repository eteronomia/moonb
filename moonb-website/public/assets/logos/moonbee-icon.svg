<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Moon -->
  <circle cx="36" cy="22" r="18" fill="#D4CBC0" opacity="0.8"/>
  <circle cx="33" cy="18" r="3" fill="#C4BAB0" opacity="0.5"/>
  <circle cx="40" cy="16" r="2" fill="#C4BAB0" opacity="0.4"/>
  <circle cx="38" cy="24" r="2.5" fill="#C4BAB0" opacity="0.3"/>
  <!-- Bee body -->
  <ellipse cx="30" cy="38" rx="10" ry="14" transform="rotate(25 30 38)" fill="#1A1A1A"/>
  <!-- Yellow stripes -->
  <ellipse cx="28" cy="32" rx="8" ry="3.5" transform="rotate(25 28 32)" fill="#F5A623"/>
  <ellipse cx="31" cy="40" rx="8" ry="3.5" transform="rotate(25 31 40)" fill="#F5A623"/>
  <!-- Head -->
  <circle cx="36" cy="28" r="7" fill="#F5A623"/>
  <circle cx="38" cy="26" r="5" fill="#1A1A1A" opacity="0.15"/>
  <circle cx="39" cy="26" r="2.5" fill="#1A1A1A"/>
  <!-- Wing -->
  <ellipse cx="18" cy="24" rx="10" ry="5" transform="rotate(-30 18 24)" fill="#F5A623" opacity="0.85"/>
  <ellipse cx="20" cy="28" rx="8" ry="4" transform="rotate(-15 20 28)" fill="#E8941E" opacity="0.7"/>
  <!-- Antennae -->
  <path d="M38 22 Q40 16 42 14" stroke="#1A1A1A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M36 21 Q37 15 36 13" stroke="#1A1A1A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Smile -->
  <path d="M37 30 Q39 33 41 30" stroke="#1A1A1A" stroke-width="1" fill="none" stroke-linecap="round"/>
</svg>
